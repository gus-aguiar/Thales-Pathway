<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paleta de Cores</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="title">Paleta de Cores</h1>

    <div id="color-palette"></div>

    <button id="button-random-color">Cores aleatórias</button>

    <button id="clear-board">Limpar</button>

    <div class="board-controls">
      <input type="number" id="board-size" min="1" placeholder="tamanho do quadro" />
      <button id="generate-board">VQV</button>
    </div>

    <div id="pixel-board"></div>

    <script src="script.js"></script>
  </body>
</html>
