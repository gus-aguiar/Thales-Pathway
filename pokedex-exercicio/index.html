<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Pokédex</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Container principal que segura toda a Pokédex -->
    <main class="pokedex">
      <!-- Cabeçalho com o título do exercício -->
      <header class="pokedex__header">
        <div class="pokedex__title-block">
          <h1>Mini Pokédex</h1>
          <!-- EDITE AQUI: Troque a mensagem para deixar o exercício com a sua cara -->
          <p>Pesquise por nome ou número de um Pokémon menos perfeito que a Pheromosa.<br> Ou pode pesquisar por ela mesma.</p>
        </div>
        <img
          class="pokedex__pheromosa"
          src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/795.png"
          alt="Ilustração do Gengar dando boas-vindas ao exercício"
        />
      </header>

      <!-- Formulário simples para buscar um Pokémon na API -->
      <form class="pokedex__form" id="search-form">
        <!-- Campo de texto onde o usuário digita o nome ou o número -->
        <label for="pokemon-input" class="sr-only">Nome ou número do Pokémon</label>
        <input
          id="pokemon-input"
          type="text"
          placeholder="Ex.: pheromosa ou 795"
          autocomplete="off"
          required
        />
        <!-- Botão que dispara a busca quando clicado -->
        <button type="submit">Buscar</button>
      </form>

      <!-- Área onde as informações do Pokémon serão exibidas dinamicamente -->
      <section class="pokedex__result" id="pokemon-result" aria-live="polite">
        <!-- Um cartão vazio é exibido inicialmente como orientação visual -->
        <article class="pokemon-card pokemon-card--placeholder">
          <p>Digite um nome ou número para começar a sua pesquisa.</p>
        </article>
      </section>

      <!-- Rodapé com dicas extras sobre o exercício -->
      <footer class="pokedex__footer">
        <p>
          Dica: experimente procurar por <strong>bulbasaur</strong>,
          <strong>charizard</strong> ou <strong>pheromosa</strong>.
        </p>
      </footer>
    </main>

    <!-- Importação do arquivo JavaScript que cuida das buscas -->
    <script src="script.js"></script>
  </body>
</html>
